<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Solar Booking</title>
<link rel="stylesheet" href="booking.css">
</head>

<body>
  

<header class="header">

<div class="brand">
  <img src="logo.png.png" class="logo" alt="logo">
  <h2 data-key="company">Sunwayy Solar Energy</h2>
</div>

<nav>
    <button id="themeToggle">🌙</button>
  <select id="languageSwitcher">
    <option value="en">EN</option>
    <option value="hi">HI</option>
    <option value="mr">MR</option>
  </select>
</nav>

</header>

<section class="booking-container">

<h1 data-key="title">Solar Installation Booking</h1>

<form id="bookingForm">

<div class="form-group">
<label data-key="name">Full Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label data-key="mobile">Mobile Number</label>
<input type="number" id="mobile" required>
</div>

<div class="form-group">
<label data-key="city">City</label>
<input type="text" id="city" required>
</div>

<div class="form-group">
<label data-key="bill">Monthly Electricity Bill (₹)</label>
<input type="number" id="bill" required>
</div>

<div class="form-group">
<label data-key="scheme">Select Government Scheme</label>

<select id="scheme">
<option data-key="scheme1">PM Surya Yojana</option>
<option data-key="scheme2">PM KUSUM Scheme</option>
<option data-key="scheme3">Grid Connected Rooftop Programme</option>
</select>

</div>

<div class="form-group">
<label data-key="size">Select Solar System Size</label>

<select id="size">
<option>1 kW</option>
<option>2 kW</option>
<option>3 kW</option>
<option>5 kW</option>
<option>10 kW</option>
</select>

</div>

<button type="button" onclick="bookNow()" class="book-btn" data-key="book">
Book Now
</button>

</form>

</section>

<footer>
<p data-key="footer">© Sunwayy Solar Energy</p>
</footer>

<script src="booking.js"></script>

</body>
</html>
